<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AWS Test workflow diagram</title>
  <desc id="desc">A simple workflow showing local CSV files moving into Amazon S3, then Athena queries, then SageMaker modeling outputs and notes.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef7f4" />
      <stop offset="100%" stop-color="#dceee8" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#24483c" flood-opacity="0.12" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 Z" fill="#1f5c4a" />
    </marker>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <rect x="32" y="32" width="1136" height="611" rx="28" fill="#f8fcfb" stroke="#c6ddd4" stroke-width="2" />

  <text x="84" y="104" fill="#173d31" font-size="42" font-family="Helvetica, Arial, sans-serif" font-weight="700">
    AWS Test Workflow
  </text>
  <text x="84" y="142" fill="#487062" font-size="22" font-family="Helvetica, Arial, sans-serif">
    NYC 311 service requests analyzed through a documented S3, Athena, and SageMaker pipeline
  </text>

  <g filter="url(#shadow)">
    <rect x="88" y="226" width="270" height="214" rx="24" fill="#ffffff" stroke="#b9d3c9" stroke-width="2" />
    <rect x="465" y="226" width="270" height="214" rx="24" fill="#ffffff" stroke="#b9d3c9" stroke-width="2" />
    <rect x="842" y="226" width="270" height="214" rx="24" fill="#ffffff" stroke="#b9d3c9" stroke-width="2" />
  </g>

  <path d="M358 333 C398 333, 425 333, 465 333" fill="none" stroke="#1f5c4a" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M735 333 C775 333, 802 333, 842 333" fill="none" stroke="#1f5c4a" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow)" />

  <g font-family="Helvetica, Arial, sans-serif">
    <text x="223" y="285" text-anchor="middle" fill="#173d31" font-size="30" font-weight="700">Local CSV Data</text>
    <text x="223" y="322" text-anchor="middle" fill="#487062" font-size="20">complaints.csv</text>
    <text x="223" y="350" text-anchor="middle" fill="#487062" font-size="20">agencies.csv</text>
    <text x="223" y="398" text-anchor="middle" fill="#2a5446" font-size="18">Documented schema</text>
    <text x="223" y="424" text-anchor="middle" fill="#2a5446" font-size="18">sanity checks</text>

    <text x="600" y="285" text-anchor="middle" fill="#173d31" font-size="30" font-weight="700">Amazon S3 + Athena</text>
    <text x="600" y="322" text-anchor="middle" fill="#487062" font-size="20">raw/complaints/</text>
    <text x="600" y="350" text-anchor="middle" fill="#487062" font-size="20">raw/agencies/</text>
    <text x="600" y="398" text-anchor="middle" fill="#2a5446" font-size="18">stakeholder queries</text>
    <text x="600" y="424" text-anchor="middle" fill="#2a5446" font-size="18">resolution-time analysis</text>

    <text x="977" y="285" text-anchor="middle" fill="#173d31" font-size="30" font-weight="700">SageMaker Outputs</text>
    <text x="977" y="322" text-anchor="middle" fill="#487062" font-size="20">modeling extract</text>
    <text x="977" y="350" text-anchor="middle" fill="#487062" font-size="20">planning notes</text>
    <text x="977" y="398" text-anchor="middle" fill="#2a5446" font-size="18">report-ready structure</text>
    <text x="977" y="424" text-anchor="middle" fill="#2a5446" font-size="18">reproducible handoff</text>
  </g>

  <g font-family="Helvetica, Arial, sans-serif">
    <text x="140" y="546" fill="#2d5a4b" font-size="18" font-weight="700">Key repo artifacts</text>
    <text x="140" y="578" fill="#487062" font-size="17">README, data dictionary, SQL files, sanity checks, modeling plan, stakeholder summary</text>
  </g>
</svg>
